<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBD Aishaaa 🎉</title>

<style>
body {
  margin:0;
  font-family: sans-serif;
  overflow:hidden;
  color:white;
  text-align:center;
}

/* Background */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  background:url('gunung.jpg') no-repeat center/cover;
  z-index:-2;
}

.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:-1;
}

/* Page */
.page {
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active {
  display:flex;
}

/* Button */
button {
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
  font-size:16px;
  margin:10px;
}

/* Flash */
.flash {
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  top:0;
  left:0;
  opacity:0;
  z-index:10;
  transition:0.3s;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="flash" id="flash"></div>

<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <h1>haloooooo aishaaaaa hari ini kamu ultaaaahhhhh yeeeyyyyy 🎉</h1>
  <button id="btn1">Lanjut</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <h2>menurut kamu kamu cantik gaaaa 😏</h2>
  <button id="btn2">yaa</button>
  <button id="noBtn">ngga</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
  <h3>💌 Ada surat buat kamu</h3>
  <button id="btn3">BUKA!!!</button>
  <p id="text"></p>
  <button id="btn4">Lanjut</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="page4">
  <h2>📸 Foto dulu yuk!</h2>
  <button id="btnFoto">FOTO</button>

  <h3 id="afterText"></h3>
  <img id="img1" src="foto1.jpg" style="display:none; width:70%; max-width:300px; border-radius:20px;">

  <button id="btn5" style="display:none;">Lanjut</button>
</div>

<!-- PAGE 5 -->
<div class="page" id="page5">
  <h2>
  makasih ya aish udah jadi temen baikkkk 🥹<br>
  walaupun kadang kadang cuekk 🥲<br>
  tapi kamu tetep seru 😆💖
  </h2>
  <button id="btn6">Finish</button>
</div>

<!-- PAGE 6 -->
<div class="page" id="page6">
  <h1>maaf ya cuma bisa ngasih giniii 😭</h1>
  <h2>intinya... HBDDDD AISHAAAA 🎉💖</h2>
</div>

<script>
function nextPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page'+n).classList.add('active');
}

/* MUSIK */
let music = document.getElementById("music");

document.getElementById("btn1").addEventListener("click", function(){
  music.volume = 0.2;
  music.play();
  nextPage(2);
});

document.getElementById("btn2").onclick = ()=> nextPage(3);
document.getElementById("btn4").onclick = ()=> nextPage(4);
document.getElementById("btn5").onclick = ()=> nextPage(5);
document.getElementById("btn6").onclick = ()=> nextPage(6);

/* tombol ngga kabur */
let noBtn=document.getElementById("noBtn");
noBtn.addEventListener("mouseover",()=>{
  noBtn.style.position="absolute";
  noBtn.style.left=Math.random()*80+"%";
  noBtn.style.top=Math.random()*80+"%";
});

/* surat */
document.getElementById("btn3").onclick = function(){
  let text="selamat ultah yaaaaa aishaaaa 🎉 semoga panjang umur, sehat selalu, makin cantik tiap hari 😆✨";
  let i=0;
  document.getElementById("text").innerHTML="";
  function type(){
    if(i<text.length){
      document.getElementById("text").innerHTML+=text.charAt(i);
      i++;
      setTimeout(type,40);
    }
  }
  type();
}

/* kamera */
document.getElementById("btnFoto").onclick = function(){
  let flash=document.getElementById("flash");
  flash.style.opacity=1;

  let audio=new Audio("https://www.soundjay.com/mechanical/camera-shutter-click-01.mp3");
  audio.play();

  setTimeout(()=>{
    flash.style.opacity=0;

    document.getElementById("afterText").innerHTML="liat dehhh cantik kan 😆";

    document.getElementById("img1").style.display="block";
    document.getElementById("btn5").style.display="inline-block";

  },500);
}
</script>

</body>
</html>
